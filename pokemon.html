<!DOCTYPE html>
<html lang="ja">
<head>
  <title>今日のポケモン — NOVA</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff4d8d;
      --purple: #9b59ff;
      --dark: #0a0a0f;
      --dark2: #12121a;
      --dark3: #1a1a26;
    }

    body {
      background-color: var(--dark);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 40%, rgba(155,89,255,0.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 25% 65%, rgba(255,77,141,0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* TICKER */
    .ticker {
      width: 100%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      padding: 10px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      z-index: 10;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 20s linear infinite;
      font-size: 0.7rem;
      letter-spacing: 4px;
      font-weight: 700;
    }
    @keyframes ticker {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }

    /* NAV */
    nav {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-back {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--pink); }

    /* MAIN CARD */
    .page-card {
      position: relative;
      z-index: 1;
      margin: 32px 16px 60px;
      width: min(520px, 100%);
      background: var(--dark2);
      border-radius: 28px;
      border: 1px solid rgba(155,89,255,0.2);
      padding: 48px 40px;
      box-shadow:
        0 0 60px rgba(155,89,255,0.1),
        0 0 120px rgba(255,77,141,0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      text-align: center;
    }

    .page-subtitle {
      font-size: 0.65rem;
      letter-spacing: 5px;
      color: var(--pink);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    /* POKEMON DISPLAY */
    .pokemon-stage {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 32px;
    }

    .pokemon-glow {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(155,89,255,0.25) 0%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.15); opacity: 1; }
    }

    #pokemonImage {
      position: relative;
      z-index: 1;
      width: 180px;
      height: 180px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 20px rgba(155,89,255,0.5));
      animation: float 3s ease-in-out infinite;
      margin-top: 20px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .pokemon-number {
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: var(--purple);
      margin-bottom: 8px;
    }

    #pokemonName {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      min-height: 1.2em;
    }

    /* TYPES */
    .types {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .type-badge {
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ポケモンタイプ別カラー */
    .type-fire     { background: rgba(255,100,50,0.2);  border: 1px solid rgba(255,100,50,0.5);  color: #ff8c5a; }
    .type-water    { background: rgba(50,150,255,0.2);  border: 1px solid rgba(50,150,255,0.5);  color: #5ab4ff; }
    .type-grass    { background: rgba(80,200,80,0.2);   border: 1px solid rgba(80,200,80,0.5);   color: #6dda6d; }
    .type-electric { background: rgba(255,220,0,0.2);   border: 1px solid rgba(255,220,0,0.5);   color: #ffd700; }
    .type-psychic  { background: rgba(255,77,141,0.2);  border: 1px solid rgba(255,77,141,0.5);  color: #ff6b9d; }
    .type-ice      { background: rgba(120,220,240,0.2); border: 1px solid rgba(120,220,240,0.5); color: #7adcf0; }
    .type-dragon   { background: rgba(100,50,220,0.2);  border: 1px solid rgba(100,50,220,0.5);  color: #9b6bff; }
    .type-dark     { background: rgba(80,60,50,0.4);    border: 1px solid rgba(150,120,100,0.4); color: #c0a080; }
    .type-fairy    { background: rgba(255,150,200,0.2); border: 1px solid rgba(255,150,200,0.5); color: #ffaad4; }
    .type-normal   { background: rgba(180,180,160,0.2); border: 1px solid rgba(180,180,160,0.4); color: #c8c8b0; }
    .type-fighting { background: rgba(200,80,50,0.2);   border: 1px solid rgba(200,80,50,0.5);   color: #e07060; }
    .type-poison   { background: rgba(155,89,255,0.2);  border: 1px solid rgba(155,89,255,0.5);  color: #b07aff; }
    .type-ground   { background: rgba(200,160,80,0.2);  border: 1px solid rgba(200,160,80,0.5);  color: #d4b060; }
    .type-flying   { background: rgba(130,170,240,0.2); border: 1px solid rgba(130,170,240,0.5); color: #90b8f0; }
    .type-bug      { background: rgba(130,200,80,0.2);  border: 1px solid rgba(130,200,80,0.5);  color: #96d460; }
    .type-rock     { background: rgba(180,160,100,0.2); border: 1px solid rgba(180,160,100,0.5); color: #c8b470; }
    .type-ghost    { background: rgba(90,70,140,0.3);   border: 1px solid rgba(130,100,200,0.5); color: #a080e0; }
    .type-steel    { background: rgba(160,170,180,0.2); border: 1px solid rgba(160,170,180,0.5); color: #b8c4cc; }

    /* STATS */
    .stats {
      margin-bottom: 36px;
      text-align: left;
    }

    .stats-title {
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: center;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .stat-label {
      font-size: 0.62rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      width: 50px;
      flex-shrink: 0;
    }

    .stat-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--dark3);
      border-radius: 10px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      transition: width 0.8s ease;
      width: 0;
    }

    .stat-num {
      font-size: 0.75rem;
      font-weight: 700;
      width: 32px;
      text-align: right;
      color: rgba(255,255,255,0.6);
    }

    /* BUTTON */
    .next-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      transition: opacity 0.3s, transform 0.2s;
    }

    .next-btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    .next-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px 0;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      animation: bounce 1s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .loading-text {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <div class="ticker">
    <span class="ticker-inner">
      ★ TODAY'S POKEMON &nbsp;&nbsp;&nbsp; ✦ 今日のポケモンは誰？ &nbsp;&nbsp;&nbsp; ★ NOVA × POKEMON &nbsp;&nbsp;&nbsp; ✦ CATCH THEM ALL! &nbsp;&nbsp;&nbsp; ★ WHO'S THAT POKEMON? &nbsp;&nbsp;&nbsp;
    </span>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">NOVA</a>
    <a href="index.html" class="nav-back">← BACK TO HOME</a>
  </nav>

  <div class="page-card">
    <p class="page-subtitle">★ Nova × Pokémon ★</p>
    <h1>TODAY'S POKEMON</h1>
    <p class="page-desc">毎回ランダムなポケモンが登場！</p>

    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <p class="loading-text">LOADING...</p>
    </div>

    <!-- ポケモン表示 -->
    <div id="pokemonDisplay" style="display:none">
      <div class="pokemon-stage">
        <div class="pokemon-glow"></div>
        <img id="pokemonImage" src="" alt="pokemon">
      </div>

      <p class="pokemon-number" id="pokemonNumber">#000</p>
      <h2 id="pokemonName"></h2>
      <div class="types" id="pokemonTypes"></div>

      <div class="stats">
        <p class="stats-title">Base Stats</p>
        <div id="statsContainer"></div>
      </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="loadPokemon()">✦ NEXT POKEMON ✦</button>
  </div>

  <script>
    const statLabels = { hp: 'HP', attack: 'ATK', defense: 'DEF', 'special-attack': 'SpATK', 'special-defense': 'SpDEF', speed: 'SPD' };

    async function loadPokemon() {
      const btn = document.getElementById('nextBtn');
      btn.disabled = true;
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('pokemonDisplay').style.display = 'none';

      const pokemonNumber = Math.floor(Math.random() * 898) + 1;

      try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonNumber}`);
        console.log(response);
        const data = await response.json();
        console.log(data);

        // 番号・名前
        document.getElementById('pokemonNumber').textContent = `#${String(data.id).padStart(3, '0')}`;
        document.getElementById('pokemonName').textContent = data.name;

        // 画像
        document.getElementById('pokemonImage').src = data.sprites.front_default;

        // タイプ
        const typesEl = document.getElementById('pokemonTypes');
        typesEl.innerHTML = '';
        data.types.forEach(t => {
          const badge = document.createElement('span');
          badge.className = `type-badge type-${t.type.name}`;
          badge.textContent = t.type.name;
          typesEl.appendChild(badge);
        });

        // ステータス
        const statsEl = document.getElementById('statsContainer');
        statsEl.innerHTML = '';
        data.stats.forEach(s => {
          const label = statLabels[s.stat.name] || s.stat.name;
          const pct = Math.min(100, (s.base_stat / 255) * 100);
          statsEl.innerHTML += `
            <div class="stat-row">
              <span class="stat-label">${label}</span>
              <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%"></div></div>
              <span class="stat-num">${s.base_stat}</span>
            </div>`;
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('pokemonDisplay').style.display = 'block';

      } catch (error) {
        console.error(`エラーが発生しました:${error}`);
        document.getElementById('loading').style.display = 'none';
      }

      btn.disabled = false;
    }

    loadPokemon();
  </script>

</body>
</html>
