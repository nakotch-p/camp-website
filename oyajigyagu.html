<!DOCTYPE html>
<html lang="ja">
<head>
  <title>親父ギャグ — =DOG DAD JOKES</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff4d8d;
      --purple: #9b59ff;
      --yellow: #ffd700;
      --dark: #0a0a0f;
      --dark2: #12121a;
      --dark3: #1a1a26;
    }

    body {
      background-color: var(--dark);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 82% 12%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 78%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 62% 38%, rgba(255,77,141,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 22% 62%, rgba(155,89,255,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* TICKER */
    .ticker {
      width: 100%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      padding: 10px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      z-index: 10;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 20s linear infinite;
      font-size: 0.7rem;
      letter-spacing: 4px;
      font-weight: 700;
    }
    @keyframes ticker {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }

    /* NAV */
    nav {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-back {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--pink); }

    /* HERO */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px 24px 40px;
    }
    .hero-tag {
      font-size: 0.65rem;
      letter-spacing: 5px;
      color: var(--yellow);
      margin-bottom: 12px;
    }
    .hero-title {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #fff 20%, var(--pink) 60%, var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .hero-sub {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
    }

    /* MAIN CARD */
    .joke-wrapper {
      position: relative;
      z-index: 1;
      width: min(680px, 100%);
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .joke-card {
      width: 100%;
      background: var(--dark2);
      border-radius: 28px;
      border: 1px solid rgba(155,89,255,0.2);
      padding: 48px 44px;
      box-shadow:
        0 0 80px rgba(155,89,255,0.1),
        0 0 160px rgba(255,77,141,0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* 背景グロー */
    .joke-card::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(155,89,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .joke-label {
      font-size: 0.6rem;
      letter-spacing: 5px;
      color: var(--purple);
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .joke-text {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.8;
      color: rgba(255,255,255,0.92);
      transition: opacity 0.3s, transform 0.3s;
    }

    .joke-text.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }
    .joke-text.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* 笑いリアクション */
    .reaction-bar {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .react-btn {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.5);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 2px;
    }
    .react-btn:hover {
      border-color: var(--pink);
      color: #fff;
      transform: scale(1.08);
    }
    .react-btn.active {
      background: linear-gradient(135deg, rgba(255,77,141,0.2), rgba(155,89,255,0.2));
      border-color: var(--pink);
      color: #fff;
    }
    .react-emoji { font-size: 1.2rem; }

    /* そっか オーバーレイ */
    .sokka-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: none;
    }
    .sokka-text {
      font-size: clamp(4rem, 16vw, 8rem);
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a8d8ff 0%, #6eb5ff 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(147,197,253,0.6));
      opacity: 0;
      transform: scale(0.5) translateY(20px);
      animation: sokkaPop 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes sokkaPop {
      0%   { opacity: 0; transform: scale(0.5) translateY(20px); }
      35%  { opacity: 1; transform: scale(1.08) translateY(-4px); }
      55%  { transform: scale(0.97) translateY(2px); }
      72%  { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(1.05) translateY(-10px); }
    }

    /* 雪 */
    .snowflake {
      position: fixed;
      top: -20px;
      pointer-events: none;
      z-index: 997;
      color: #fff;
      opacity: 0;
      animation: snowFall linear forwards;
      user-select: none;
    }
    @keyframes snowFall {
      0%   { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
      10%  { opacity: 0.9; }
      80%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(100vh) translateX(var(--drift)) rotate(var(--spin)); }
    }

    /* 親父 オーバーレイ */
    .oyaji-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: none;
    }
    .oyaji-emoji {
      font-size: clamp(6rem, 22vw, 12rem);
      opacity: 0;
      transform: scale(0.3) rotate(-15deg);
      animation: oyajiPop 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.5));
    }
    @keyframes oyajiPop {
      0%   { opacity: 0; transform: scale(0.3) rotate(-15deg); }
      35%  { opacity: 1; transform: scale(1.15) rotate(5deg); }
      55%  { transform: scale(0.95) rotate(-2deg); }
      72%  { opacity: 1; transform: scale(1.02) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.2) rotate(0deg); }
    }

    /* キラキラ sparkle */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 998;
      font-size: 1.4rem;
      animation: sparkleFly linear forwards;
      opacity: 0;
    }
    @keyframes sparkleFly {
      0%   { opacity: 0; transform: translate(0,0) scale(0.4) rotate(0deg); }
      20%  { opacity: 1; transform: translate(var(--tx1),var(--ty1)) scale(1.1) rotate(60deg); }
      70%  { opacity: 0.8; transform: translate(var(--tx2),var(--ty2)) scale(0.9) rotate(180deg); }
      100% { opacity: 0; transform: translate(var(--tx3),var(--ty3)) scale(0.3) rotate(360deg); }
    }

    /* ウケた オーバーレイ */
    .uketa-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: none;
    }
    .uketa-text {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 40px rgba(255,77,141,0.6));
      opacity: 0;
      transform: scale(0.4) rotate(-8deg);
      animation: uketaPop 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes uketaPop {
      0%   { opacity: 0; transform: scale(0.4) rotate(-8deg); }
      30%  { opacity: 1; transform: scale(1.1) rotate(3deg); }
      55%  { transform: scale(0.95) rotate(-1deg); }
      70%  { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.15) rotate(0deg); }
    }

    /* NEXT BUTTON */
    .next-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 8px 32px rgba(255,77,141,0.25);
      position: relative;
      overflow: hidden;
    }
    .next-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .next-btn:hover {
      opacity: 0.9;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(255,77,141,0.35);
    }
    .next-btn:hover::before { opacity: 1; }
    .next-btn:active { transform: translateY(0); }
    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* STATS ROW */
    .stats-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
    }

    .stat-val {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
    }

    /* HISTORY */
    .history-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }
    .history-title {
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
    }
    .history-clear {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: color 0.2s;
    }
    .history-clear:hover { color: var(--pink); }

    .history-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      letter-spacing: 0.5px;
      transition: border-color 0.2s;
      cursor: default;
    }
    .history-item:hover {
      border-color: rgba(155,89,255,0.3);
      color: rgba(255,255,255,0.7);
    }

    /* LOADING SPINNER */
    .spinner {
      display: none;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,77,141,0.15);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* CONFETTI */
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* BACK TO HOME */
    .back-btn {
      width: 100%;
      display: block;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s;
    }
    .back-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
    }
  </style>
</head>
<body>

  <div class="ticker">
    <span class="ticker-inner">
      ★ =DOG 親父ギャグコーナー &nbsp;&nbsp;&nbsp; ✦ 笑えたら負け &nbsp;&nbsp;&nbsp; ★ 寒い？それが狙いだ &nbsp;&nbsp;&nbsp; ✦ =DOG × OYAJI &nbsp;&nbsp;&nbsp; ★ 全力の親父ギャグ &nbsp;&nbsp;&nbsp; ✦ 笑ってください &nbsp;&nbsp;&nbsp;
    </span>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">=DOG</a>
    <a href="index.html" class="nav-back">← BACK TO HOME</a>
  </nav>

  <div class="hero">
    <p class="hero-tag">★ =DOG Official Joke Corner ★</p>
    <h1 class="hero-title">OYAJI GYAGU</h1>
    <p class="hero-sub">親父ギャグ — DAD JOKE COLLECTION</p>
  </div>

  <div class="joke-wrapper">

    <!-- メインカード -->
    <div class="joke-card">
      <p class="joke-label">★ 本日の親父ギャグ ★</p>
      <div class="spinner" id="spinner"></div>
      <p class="joke-text fade-in" id="jokeText">ボタンを押してギャグを表示！</p>
      <div class="reaction-bar" id="reactionBar">
        <button class="react-btn" onclick="react('lol')"><span class="react-emoji">😂</span> 笑った</button>
        <button class="react-btn" onclick="react('groan')"><span class="react-emoji">😩</span> 寒い</button>
        <button class="react-btn" onclick="react('dad')"><span class="react-emoji">👴</span> おやじ</button>
      </div>
    </div>

    <!-- NEXT BUTTON -->
    <button class="next-btn" id="nextBtn" onclick="fetchJoke()">
      ★ 次のギャグ ★
    </button>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="countVal">0</div>
        <div class="stat-label">見たギャグ数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="lolVal">0</div>
        <div class="stat-label">笑った回数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="groanVal">0</div>
        <div class="stat-label">寒かった回数</div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-header">
      <span class="history-title">ギャグ履歴</span>
      <button class="history-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item" style="color:rgba(255,255,255,0.2);text-align:center;letter-spacing:3px;font-size:0.65rem;">
        履歴なし — ギャグを読み込むとここに表示されます
      </div>
    </div>

    <a href="index.html" class="back-btn">← BACK TO HOME</a>
  </div>

  <script>
    const jokes = [
      'トイレで転んだ。　　ウォシュレット！',
      'コーヒーを飲もうとしたら熱くて飲めなかった。　　カフェ・オ・レ（お・熱れ）！',
      '布団がふっとんだ！',
      'アルミ缶の上にあるミカン。',
      '川でシャケを釣ったら醤油を持ってくるのを忘れた。　　しょうがない！',
      '寿司を食べたら眠くなった。　　すし（寿司）眠い！',
      '馬が転んだ。　　おっとっと（馬がおっ倒れた）！',
      '山でカレーを食べた。　　カレーが山（さん）盛りだ！',
      '電車に乗ったら混んでいた。　　こんにちは（混・日は）！',
      'カエルが飛び跳ねた。　　ぴょん吉（飛・よん・吉）！',
      '牛が笑った。　　モーおかしい！',
      '怒っているカメ。　　カメ（噛め）！',
      'タコが転んだ。　　タコ（打こ）ん！',
      '電気をつけたら明るくなった。　　デン（電）気に入った！',
      '猫がピアノを弾いた。　　ネコ（猫）ンチェルト！',
      '昨日うなぎを食べた。　　ウ（鵜）なぎだけに、飲み込んだ！',
      'カバが走った。　　カ（蚊）バ（馬）ない速さだ！',
      'リンゴが落ちた。　　リン（鈴）ゴー（語）！',
      'クモが巣を作った。　　クモ（雲）の上の出来事だ！',
      'サルが木から落ちた。　　サル（去る）とも友は去らず！',
      'ラクダが砂漠を歩いた。　　ラク（楽）だな〜！',
      'イルカがジャンプした。　　イル（要る）か？もちろんです！',
      'カニが横歩きした。　　カニ（可に）わらしい！',
      '冬に鍋を食べた。　　アツ（熱）い！ナベ（鍋）じゃないの！',
      'お風呂で鼻歌を歌った。　　フロ（風呂）ストレスが流れた！',
      '傘を忘れた。　　カ（蚊）サ（差）ない日に雨だとは！',
      'パンダが笑った。　　パンダ（判断）力がある！',
      'ゾウが踊った。　　ゾウ（像）外だ！',
      'コアラが木に登った。　　コアラ（心から）応援してるよ！',
      'ハチが飛んだ。　　ハチ（8）がつ（月）に多いね！',
    ];

    let jokeCount = 0;
    let lolCount = 0;
    let groanCount = 0;
    let currentJoke = '';
    let lastIndex = -1;
    const jokeHistory = [];

    function fetchJoke() {
      const btn = document.getElementById('nextBtn');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('jokeText');

      btn.disabled = true;
      text.classList.add('fade-out');
      text.classList.remove('fade-in');
      clearReactions();

      setTimeout(() => {
        text.style.display = 'none';
        spinner.style.display = 'block';
      }, 250);

      setTimeout(() => {
        let idx;
        do { idx = Math.floor(Math.random() * jokes.length); } while (idx === lastIndex);
        lastIndex = idx;
        currentJoke = jokes[idx];

        spinner.style.display = 'none';
        text.style.display = 'block';
        text.textContent = currentJoke;
        text.classList.remove('fade-out');
        text.classList.add('fade-in');

        jokeCount++;
        document.getElementById('countVal').textContent = jokeCount;
        addToHistory(currentJoke);
        btn.disabled = false;
      }, 600);
    }

    function react(type) {
      if (!currentJoke) return;
      clearReactions();
      const btns = document.querySelectorAll('.react-btn');
      const idx = { lol: 0, groan: 1, dad: 2 };
      btns[idx[type]].classList.add('active');

      if (type === 'lol') {
        lolCount++;
        document.getElementById('lolVal').textContent = lolCount;
        launchConfetti();
        showUketa();
      } else if (type === 'groan') {
        groanCount++;
        document.getElementById('groanVal').textContent = groanCount;
        showSokka();
      } else if (type === 'dad') {
        showOyaji();
      }
    }

    function clearReactions() {
      document.querySelectorAll('.react-btn').forEach(b => b.classList.remove('active'));
    }

    function addToHistory(joke) {
      jokeHistory.unshift(joke);
      if (jokeHistory.length > 8) jokeHistory.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (jokeHistory.length === 0) {
        list.innerHTML = '<div class="history-item" style="color:rgba(255,255,255,0.2);text-align:center;letter-spacing:3px;font-size:0.65rem;">履歴なし</div>';
        return;
      }
      list.innerHTML = jokeHistory.map((j, i) =>
        `<div class="history-item">${i === 0 ? '▶ ' : ''}${j}</div>`
      ).join('');
    }

    function clearHistory() {
      jokeHistory.length = 0;
      renderHistory();
    }

    function showSokka() {
      const overlay = document.createElement('div');
      overlay.className = 'sokka-overlay';
      overlay.innerHTML = '<span class="sokka-text">そっか</span>';
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 1800);

      const flakes = ['❄', '❅', '❆', '✼', '•'];
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const f = document.createElement('div');
          f.className = 'snowflake';
          f.textContent = flakes[Math.floor(Math.random() * flakes.length)];
          f.style.left = Math.random() * 100 + 'vw';
          f.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
          f.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
          f.style.setProperty('--spin', (Math.random() * 360) + 'deg');
          f.style.animationDuration = (2 + Math.random() * 2) + 's';
          document.body.appendChild(f);
          setTimeout(() => f.remove(), 4500);
        }, i * 50);
      }
    }

    function showOyaji() {
      const overlay = document.createElement('div');
      overlay.className = 'oyaji-overlay';
      overlay.innerHTML = '<span class="oyaji-emoji">👴</span>';
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 1700);

      const symbols = ['✨', '⭐', '💛', '🌟', '✦', '★', '💫', '🌙'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      for (let i = 0; i < 28; i++) {
        setTimeout(() => {
          const s = document.createElement('div');
          s.className = 'sparkle';
          s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          const angle = Math.random() * 360;
          const dist1 = 60 + Math.random() * 80;
          const dist2 = 120 + Math.random() * 120;
          const dist3 = 180 + Math.random() * 160;
          const rad = angle * Math.PI / 180;
          s.style.left = cx + 'px';
          s.style.top  = cy + 'px';
          s.style.setProperty('--tx1', Math.cos(rad) * dist1 + 'px');
          s.style.setProperty('--ty1', Math.sin(rad) * dist1 + 'px');
          s.style.setProperty('--tx2', Math.cos(rad) * dist2 + 'px');
          s.style.setProperty('--ty2', Math.sin(rad) * dist2 + 'px');
          s.style.setProperty('--tx3', Math.cos(rad) * dist3 + 'px');
          s.style.setProperty('--ty3', Math.sin(rad) * dist3 + 'px');
          s.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
          s.style.fontSize = (0.9 + Math.random() * 1.0) + 'rem';
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 2000);
        }, i * 30);
      }
    }

    function showUketa() {
      const overlay = document.createElement('div');
      overlay.className = 'uketa-overlay';
      overlay.innerHTML = '<span class="uketa-text">ウケた</span>';
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 1500);
    }

    function launchConfetti() {
      const colors = ['#ff4d8d', '#9b59ff', '#fff', '#ffd700', '#c084fc'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDuration = (1.2 + Math.random() * 1.8) + 's';
          c.style.width = (5 + Math.random() * 7) + 'px';
          c.style.height = (5 + Math.random() * 7) + 'px';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 3500);
        }, i * 35);
      }
    }

    fetchJoke();
  </script>

</body>
</html>
